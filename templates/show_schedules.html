{% extends "base.html" %}


{% block title %}Просмотр событий| IT-Куб Владикавказ{% endblock %}

{% block page_title %}Расписание{% endblock %}
{% block page_subtitle %}по неделям от текущей{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="registration-container">
        <!-- Сюда JS будет "склеивать" таблицы -->
        <div id="schedule-wrapper"></div>

        <!-- Маячок для загрузки -->
        <div id="sentinel" class="text-center p-4">
            <div class="spinner-border text-danger" role="status"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
    <script>
        // Начальная дата — сегодня
        let currentDate = new Date().toISOString().split('T')[0];
        const wrapper = document.querySelector('#schedule-wrapper');
        const sentinel = document.querySelector('#sentinel');

        const loadMore = () => {
            fetch(`/get_more_days?start_date=${currentDate}`)
                .then(res => res.text())
                .then(html => {
                    // 1. Вставляем новый контент
                    wrapper.insertAdjacentHTML('beforeend', html);
                    
                    // 2. Ищем маркер следующей даты в только что вставленном коде
                    const marker = document.querySelector('#next-date-marker');
                    if (marker) {
                        currentDate = marker.getAttribute('data-next');
                        marker.remove(); // Удаляем старый маркер
                    }
                });
        };

        // Следим за "стражем" (sentinel) внизу страницы
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadMore();
            }
        }, { rootMargin: '0px' }); // Начинаем грузить за 200px до конца

        observer.observe(sentinel);
    </script>
    <script>let scrollAmount = 0;

window.addEventListener('wheel', function(e) {
    e.preventDefault(); // Останавливаем стандартный резкий скролл
    
    const slowDownFactor = 3; // Чем выше число, тем медленнее скролл
    const delta = e.deltaY / slowDownFactor;
    
    window.scrollBy({
        top: delta,
        behavior: 'auto' // 'auto' работает быстрее и отзывчивее при ручном управлении
    });
}, { passive: false });
    </script>
{% endblock %}
