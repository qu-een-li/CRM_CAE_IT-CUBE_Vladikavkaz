{% extends "base.html" %}


{% block title %}Просмотр событий| IT-Куб Владикавказ{% endblock %}

{% block page_title %}Расписание{% endblock %}
{% block page_subtitle %}по неделям от текущей{% endblock %}

{% block content %}
<!-- фильтр по группам -->
 
<div class="container mt-4" style="display: flex; justify-content: flex-end;">
    <select onchange="window.location.href=this.value;">
        <option value="" disabled selected>Выберите группу</option>
        <option value="/show_schedules">📅Все группы</option>
        {% for id_and_group_name in id_and_group_names %}
            <option value="/show_schedules?group_id={{ id_and_group_name['id'] }}">
                👥{{ id_and_group_name['name_of_group'] }}
            </option>
        {% endfor %}
    </select>
</div>

<!-- место для таблиц расписаний -->
<div class="container mt-4">
    <div class="registration-container">
        <!-- Сюда JS будет "склеивать" таблицы -->
        <div id="schedule-wrapper"></div>

        <!-- Маячок для загрузки -->
        <div id="sentinel" class="text-center p-4">
            <div class="spinner-border text-danger" role="status"></div>
        </div>
    </div>
</div>


{% endblock %}

{% block extra_js %}
    <script>
        // Начальная дата — сегодня

        let currentDate = new Date().toISOString().split('T')[0];
        const group_id_to_filter = {{group_id_filter|tojson}}
        const wrapper = document.querySelector('#schedule-wrapper');
        const sentinel = document.querySelector('#sentinel');

        const loadMore = () => {
            // Чтобы не отправлять 100 запросов одновременно, можно добавить флаг isLoading
            if (window.isLoading) return;
            window.isLoading = true;

            fetch(`/get_more_days?start_date=${currentDate}{%if group_id_filter%}&group_id=${group_id_to_filter}{%endif%}`)
                .then(res => res.text())
                .then(html => {
                    if (!html.trim()) {
                        // Если данных больше нет, прекращаем наблюдение
                        observer.unobserve(sentinel);
                        return;
                    }

                    wrapper.insertAdjacentHTML('beforeend', html);
                    
                    const marker = document.querySelector('#next-date-marker');
                    if (marker) {
                        currentDate = marker.getAttribute('data-next');
                        marker.remove();
                    }

                    window.isLoading = false;

                    // КЛЮЧЕВОЙ МОМЕНТ:
                    // Если после добавления контента sentinel все еще виден (мало данных),
                    // вызываем loadMore еще раз автоматически.
                    checkIfSentinelVisible();
                })
                .catch(() => { window.isLoading = false; });
        };

        // Функция для принудительной проверки видимости
        const checkIfSentinelVisible = () => {
            const rect = sentinel.getBoundingClientRect();
            if (rect.top < window.innerHeight) {
                loadMore();
            }
        };

        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
                loadMore();
            }
        }, { 
            rootMargin: '10px' // Лучше оставить запас, чтобы загрузка шла заранее
        });

        observer.observe(sentinel);

        // Запускаем первичную проверку сразу после загрузки страницы
        checkIfSentinelVisible();
    </script>
    <script>let scrollAmount = 0;

window.addEventListener('wheel', function(e) {
    e.preventDefault(); // Останавливаем стандартный резкий скролл
    
    const slowDownFactor = 3; // Чем выше число, тем медленнее скролл
    const delta = e.deltaY / slowDownFactor;
    
    window.scrollBy({
        top: delta,
        behavior: 'auto' // 'auto' работает быстрее и отзывчивее при ручном управлении
    });
}, { passive: false });
    </script>
{% endblock %}
